delete:
  summary: 특정 프로젝트 팩 등록 해제 및 폴더 삭제
  description: 지정된 ID의 프로젝트 팩 정보와 해당 /PROJECTS 하위 프로젝트 폴더를 통째로 삭제합니다.
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 삭제할 프로젝트 팩의 ID
  responses:
    '200':
      description: 삭제 성공
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "프로젝트 폴더 및 데이터가 성공적으로 삭제되었습니다."
    '404':
      description: 해당 ID의 프로젝트를 찾을 수 없음
