get:
  summary: 등록된 모든 폰트 목록 조회
  description: 데이터베이스에 등록되어 있는 폰트 정보 및 다운로드 경로 목록을 반환합니다.
  responses:
    '200':
      description: 조회 성공
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas.yaml#/FontResponse'
post:
  summary: 여러 폰트 파일 일괄 등록
  description: 눈누 등에서 다운받은 여러 폰트 파일(.ttf, .otf 등)을 일괄 업로드하고 등록합니다.
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            files:
              type: array
              description: 일괄 업로드할 폰트 파일들
              items:
                type: string
                format: binary
          required:
            - files
  responses:
    '201':
      description: 폰트 파일 등록 및 업로드 성공
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas.yaml#/FontResponse'
    '400':
      description: 요청 매개변수 누락 또는 부적절한 파일 형식
