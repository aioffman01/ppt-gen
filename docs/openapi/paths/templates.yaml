get:
  summary: 등록된 모든 템플릿 목록 조회
  description: 데이터베이스에 등록되어 있는 템플릿 정보 및 다운로드 경로 목록을 반환합니다.
  responses:
    '200':
      description: 조회 성공
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas.yaml#/TemplateResponse'
post:
  summary: PPT 템플릿 파일 등록
  description: Canva 등에서 참고하여 다운로드받은 PPT 템플릿 파일(.pptx, .potx 등)을 업로드하고 등록합니다.
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            title:
              type: string
              description: 템플릿 이름
            description:
              type: string
              description: 템플릿 설명 (선택)
            file:
              type: string
              format: binary
              description: 업로드할 템플릿 파일
          required:
            - title
            - file
  responses:
    '201':
      description: 템플릿 파일 등록 및 업로드 성공
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/TemplateResponse'
    '400':
      description: 요청 매개변수 누락 또는 부적절한 파일 형식
