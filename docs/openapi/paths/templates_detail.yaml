delete:
  summary: 특정 템플릿 등록 해제 및 파일 삭제
  description: 지정된 ID의 템플릿 정보를 DB에서 지우고 저장소(/TEMPLATE)에서 해당 파일을 삭제합니다.
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 삭제할 템플릿의 ID
  responses:
    '200':
      description: 삭제 성공
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "템플릿이 성공적으로 삭제되었습니다."
    '404':
      description: 해당 ID의 템플릿을 찾을 수 없음
