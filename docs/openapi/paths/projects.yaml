get:
  summary: 등록된 모든 프로젝트 팩 목록 조회
  description: 데이터베이스에 등록되어 있는 프로젝트 팩 정보 및 폴더 경로 목록을 반환합니다.
  responses:
    '200':
      description: 조회 성공
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas.yaml#/ProjectResponse'
post:
  summary: 새 프로젝트 팩 생성 및 파일들 일괄 패키징 복사
  description: 선택한 폰트, 템플릿, 디자인 MD를 묶어 프로젝트 루트의 /PROJECTS 디렉토리에 폴더를 생성하고 물리적으로 리소스 파일들을 복사해 넣습니다.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas.yaml#/ProjectCreate'
  responses:
    '201':
      description: 프로젝트 팩 디렉토리 생성 및 리소스 패키징 완료
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/ProjectResponse'
    '400':
      description: 필수 데이터 누락
    '500':
      description: 파일 복사 또는 폴더 생성 실패
