get:
  summary: 등록된 모든 디자인 MD 파일 목록 조회
  description: 데이터베이스에 등록되어 있는 디자인 마크다운 문서 정보 및 다운로드 경로 목록을 반환합니다.
  responses:
    '200':
      description: 조회 성공
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas.yaml#/DesignMDResponse'
post:
  summary: 마크다운 텍스트를 파일로 저장하고 등록
  description: 마크다운 내용을 입력받아 실제 .md 파일로 생성하여 /DESIGN_MD 디렉토리에 저장하고 등록합니다.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas.yaml#/DesignMDCreate'
  responses:
    '201':
      description: 마크다운 파일 저장 및 등록 성공
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/DesignMDResponse'
    '400':
      description: 필수 입력 필드 누락
