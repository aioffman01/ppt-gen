  /references:
    $ref: './paths/references.yaml'
  /references/{id}:
    $ref: './paths/references_detail.yaml'
  /templates:
    $ref: './paths/templates.yaml'
  /templates/{id}:
    $ref: './paths/templates_detail.yaml'
  /design-md:
    $ref: './paths/design_md.yaml'
  /design-md/{id}:
    $ref: './paths/design_md_detail.yaml'
components:
  schemas:
    $ref: './components/schemas.yaml'


